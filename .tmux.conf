# Set vi-mode
set-window-option -g mode-keys vi

# Turn on mouse support
set -g mouse on

# Clipboard and passthrough
set -g set-clipboard on
set -g allow-passthrough on

# Open panes and windows in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Set tmux to be 24 bit color
set-option -sa terminal-overrides ",xterm*:Tc"

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Move window left/right
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# Enter copy mode with prefix + v
bind v copy-mode

# Vi-style copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Reload config (use after toggling macOS appearance to re-pick the theme)
bind R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Theme: catppuccin. mocha ~= Dracula (dark), latte matches nvim/wezterm (light).
# tmux can't hot-reload on appearance change, so the flavour is chosen at config
# load time from the macOS system appearance. After toggling Dark/Light, hit
# `prefix + R` to re-source and re-theme. Defaults to mocha (also on Linux);
# AppleInterfaceStyle only exists in Dark mode, so a failed read => Light => latte.
set -g @catppuccin_flavour 'mocha'
if-shell "uname | grep -q Darwin && ! defaults read -g AppleInterfaceStyle >/dev/null 2>&1" \
  "set -g @catppuccin_flavour 'latte'"
set -g @plugin 'catppuccin/tmux#v0.3.0'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# macOS clipboard integration (no-op on Linux)
if-shell "uname | grep -q Darwin" "set-option -g default-command 'reattach-to-user-namespace -l zsh'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
